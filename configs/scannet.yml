dataset: 
  # e.g. for scene 'bed', data should be in `data/3DOVS/bed`, and model would be saved in `output/3dovs/bed`
  name: 3DOVS
  data_path: /netscratch/arafa/data/scannet_preprocessed
  save_folder: output/scannet/without_densification
  scenes: ['scene0000_00', 'scene0062_00', 'scene0070_00', 'scene0097_00', 'scene0140_00', 'scene0200_00', 'scene0347_00', 'scene0400_00', 'scene0590_00', 'scene0645_00']

graph_weight:
  tau: 0.5
  neg_w: 0.1
  pos_w: 0.02
  neg_b: 25
  pos_b: 25
  zero_scale: 1
  level: 1

merge_proj:
  thres_connect: 0.9,0.7,0.7
  thres_merge: 100
  seg_enhance: True
  feat_assign: 1

spt:
  pcp_regularization: 0.3
  pcp_spatial_weight: 2e-1

